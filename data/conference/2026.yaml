    synopsis: ""
    speakers:
      - name: "Dr. Kathryn Dong"
        credentials: "MD, MSc, FRCPC, DRCPSC"
        bio: "Dr. Kathryn Dong is the Alberta Health Services Chair in Emergency Medicine Research at the University of Alberta. In addition to her training in emergency and addiction medicine, she also completed a Masters in Population Health at the University of Alberta. Her clinical work is as an inpatient addiction medicine physician at the Royal Alexandra Hospital. Her work focuses on improving health care access and outcomes for people who use substances and seek care in emergency departments and acute care settings."
        image: "/images/speakers/kathrynd.jpg"

