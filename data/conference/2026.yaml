    title: "Topic 3: Radiology “hot button” topics, 2026"
    synopsis: ""
    speakers:
      - name: "Dr. Anu Kumar"
        credentials: "MD, FRCPC"
        bio: "Dr. Kumar developed an interest in diagnostic imaging during medical school and completed residency in Diagnostic Radiology at the University of Toronto in 1995. She subsequently pursued subspecialty training in abdominal imaging at the University of Western Ontario, with a focus on abdominal and pelvic MRI, and have been based in Edmonton since 2001, where she serves as a Clinical Associate Professor with the University of Alberta and Diagnostic Imaging site lead at the Royal Alexandra Hospital. With over 25 years of practice, her work has focused on the expanding role of imaging and image-guided procedures in patient care, with an emphasis on collaborative, appropriate utilization of imaging resources."
        image: "/images/speakers/anuk.jpg"

