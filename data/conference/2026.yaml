    title: "Topic 4: Homelessness in Edmonton, 2026"
    synopsis: ""
    speakers:
      - name: "Dr. Rob Wittmeier"
        credentials: ""
        bio: ""
        image: ""
        
      - name: "Dr. Louis Francescutti"
        credentials: "CD, MSM, MD, PhD, MPH, FRCPC, FACP, FACPM, CCFP(PC), FRCPI, FRCPE, FRCP, FRCPG, ICD-D, CCPE"
        bio: "He is currently an emergency physician at the Royal Alexandra Hospital and the Northeast Community Health Centre in Edmonton, Alberta, Canada. As a professor in the School of Public Health at the University of Alberta, he teaches graduate courses in transformational leadership, advocacy and public health.
        
        Dr. Francescutti was selected as one of Alberta’s Top 100 Physicians of the Century by the Alberta Medical Association/College of Physicians and Surgeons of Alberta and he was also awarded theAlberta Centennial Medal from the Government of Alberta in 2005. In 2011, he was selected by Alberta Venture as one of Alberta’s 50 most influential people. In 2012, he was awarded the Queen Elizabeth II Diamond Jubilee medal. In 2022, he was awarded the Queen Elizabeth II Platinum Jubilee medal. In 2023, Louis was honored with the Order of Canada.
        
        From 2010 - 2013 he served as the President of the Royal College of Physicians and Surgeons of Canada and in 2014 - 2015 he then became the President of the Canadian Medical Association. He is the Honorary Colonel for 1 Health Services Group of the Royal Canadian Medical Services based in Edmonton. In 2017, he was awarded a Military Meritorious Service Medal from the Governor General of Canada at Rideau Hall in Ottawa. 
        
        Currently, he is developing Bridge Healing, a program to address the immediate needs of our society’s most vulnerable individuals – patients in our emergency departments experiencing homelessness.
        
        A recognized storyteller Dr. Francescutti has delivered well over 1,500 presentations worldwide to a variety of diverse audiences – from industry to governments and to the public. He was recently appointed Chair of the Board of the Canadian Centre for Substance Use and Addiction."
        image: "/images/speakers/louisf.png"

  - type: "session"
    start: "10:30"
    end: "10:55"
    title: "Topic 5: Novel Serum Biomarker for Traumatic Brain Injury"
    synopsis: "This talk will describe the  implementation of point-of-care GFAP/UCH-L1 biomarker testing for minor traumatic brain injury (mTBI) at two Edmonton EDs without on-site CT. Over the first 8 weeks, approximately 25 patients have been tested, demonstrating that the assay can be incorporated into routine ED care with minimal disruption and avoiding unnecessary transfers and imaging. This pilot trial is generating local data to allow for the more widespread adoption of the mTBI biomarker across Alberta."
    speakers:
      - name: "Dr. Kevin Skoblenick"
        credentials: "MD, MSc, PhD, FRCPC (Emergency Medicine)"
        bio: "Dr. Kevin Skoblenick is an emergency physician at both the Royal Alexandra Hospital and Northeast Community Health Center as well as a clinician-scientist with the University of Alberta Department of Emergency Medicine. His research focuses on integrating neuroscience into emergency care, with particular interest in biomarkers and novel interventions for brain injury, addiction, and mental health emergencies. He leads several translational initiatives, including the implementation of point-of-care diagnostics to improve decision-making and resource use in the emergency department."
        image: "/images/speakers/kevins.jpg"

